<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>singgah doeloe | E-Commerce</title>
    <style>
        /* Reset dasar untuk margin dan padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #fcf9f5;
            color: #333;
        }

        /* Header dan Navigasi */
        header {
            background-color: #426a9f;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            color: #fff;
            font-size: 24px;
            letter-spacing: 1px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
        }

        nav a:hover {
            color: #2ca99b;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 20px;
            background-color: #2ca99b;
            margin-bottom: 30px;
        }

        .hero h2 {
            font-size: 32px;
            color: #fff;
            margin-bottom: 10px;
        }

        .hero p {
            color: #fff;
            font-size: 18px;
        }

        /* Daftar Produk */
        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 0 40px 50px 40px;
        }

        .product-card {
            background-color: #fff;
            border-radius: 8px;
            width: 250px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .product-card h3 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        .price {
            color: #2ca99b;
            font-weight: bold;
            font-size: 18px;
            margin: 10px 0;
        }

        .btn-cart {
            background-color: #426a9f;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn-cart:hover {
            background-color: #365a8c;
        }

        /* Footer */
        footer {
            background-color: #411865;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>singgah doeloe</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="produk.html">Produk</a></li>
                <li><a href="keranjang.html">Keranjang (0)</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h2>Sweetness in Every Bite</h2>
        <p>Temukan berbagai macam dessert premium untuk harimu.</p>
    </section>

    <section class="products">
        <div class="product-card">
            <img src="https://plus.unsplash.com/premium_photo-1726718559970-3f47f44d6540?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OXx8ZGVzc2VydCUyMG1ha2FuYW58ZW58MHx8MHx8fDA%3D" alt="Cake Coklat" />
            <h3>Cake Coklat</h3>
            <p class="price">Rp 400.000</p>
            <button class="btn-cart">+ Tambah</button>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1734056650036-7002ede7b8f8?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Crepes Coklat Stroberi" />
            <h3>Crepes Coklat Stroberi</h3>
            <p class="price">Rp 35.000</p>
            <button class="btn-cart">+ Tambah</button>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1580682196728-88aeee0a86bf?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8ZGVzc2VydCUyMG1ha2FuYW58ZW58MHx8MHx8fDA%3D" alt="Pie Buah" />
            <h3>Pie Buah</h3>
            <p class="price">Rp 25.000</p>
            <button class="btn-cart">+ Tambah</button>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1581978392717-c0f3b3b22cd1?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTV8fGRlc3NlcnQlMjBtYWthbmFufGVufDB8fDB8fHww" alt="Muffin" />
            <h3>Muffin</h3>
            <p class="price">Rp 25.000</p>
            <button class="btn-cart">+ Tambah</button>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 singgah doeloe. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
