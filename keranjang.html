<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Keranjang | E-Commerce</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            }
            body {
                background-color: #fcf9f5;
                color: #333;
            }
            header {
                background-color: #426a9f;
                padding: 20px 40px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            }
            header h1 {
                color: #320321;
                font-size: 24px;
                letter-spacing: 1px;
            }
            nav ul {
                list-style: none;
                display: flex;
                gap: 20px;
            }
            nav a {
                text-decoration: none;
                color: #1a6867;
                font-weight: bold;
            }
            .hero {
                text-align: center;
                padding: 60px 20px;
                background-color: #2ca99b;
                margin-bottom: 30px;
            }
            .hero h2 {
                font-size: 32px;
                color: #17888c;
                margin-bottom: 10px;
            }
            .cart {
                max-width: 900px;
                margin: 0 auto;
                padding: 0 40px 50px 40px;
            }
            .cart-item {
                display: flex;
                align-items: center;
                justify-content: space-between;
                background-color: #20aaa7;
                border-radius: 10px;
                padding: 20px;
                margin-bottom: 20px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            }
            .cart-item div {
                flex: 1;
            }
            .cart-item h3 {
                margin-bottom: 8px;
            }
            .cart-item p {
                margin-bottom: 5px;
            }
            .checkout {
                text-align: center;
                margin-top: 30px;
            }
            .btn-checkout {
                background-color: #1e849b;
                color: rgb(6, 36, 63);
                border: none;
                padding: 12px 26px;
                border-radius: 8px;
                cursor: pointer;
                font-weight: bold;
            }
            .btn-checkout:hover {
                background-color: #08557f;
            }
            footer {
                background-color: #411865;
                color: rgb(21, 103, 128);
                text-align: center;
                padding: 20px;
                margin-top: 20px;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>singgah doeloe</h1>
            <nav>
                <ul>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="produk.html">Produk</a></li>
                    <li><a href="keranjang.html">Keranjang (0)</a></li>
                </ul>
            </nav>
        </header>
        <section class="hero">
            <h2>Keranjang Belanja</h2>
            <p>Berikut adalah daftar produk yang kamu pilih.</p>
        </section>
        <section class="cart">
            <div class="cart-item">
                <div>
                    <h3>Keranjang masih kosong</h3>
                    <p>Tambahkan produk di halaman Produk untuk melihatnya di sini.</p>
                </div>
            </div>
            <div class="checkout">
                <button class="btn-checkout">Lanjutkan ke Pembayaran</button>
            </div>
        </section>
        <footer>
            <p>&copy; 2026 Maison de Sucre. All rights reserved.</p>
        </footer>
        <script src="script.js"></script>
    </body>
</html>
