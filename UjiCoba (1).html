<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Maison de Sucre | E-Commerce</title>
        <style>
            /* Gaya dasar untuk mereset margin bawaan browser */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            }
            body {
                background-color: #fcf9f5;
                color: #333;
            }
            /* Bagian Header dan Navigasi */
            header {
                background-color: #ffb6c1;
                padding: 20px 40px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            }
            header h1 {
                color: #fff;
                font-size: 24px;
                letter-spacing: 1px;
            }
            nav ul {
                list-style: none;
                display: flex;
                gap: 20px;
            }
            nav a {
                text-decoration: none;
                color: #fff;
                font-weight: bold;
            }
            /* Bagian Banner Utama (Hero Section) */
            .hero {
                text-align: center;
                padding: 60px 20px;
                background-color: #fff;
                margin-bottom: 30px;
            }
            .hero h2 {
                font-size: 32px;
                color: #d87093;
                margin-bottom: 10px;
            }
            /* Bagian Daftar Produk */
            .products {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 25px;
                padding: 0 40px 50px 40px;
            }
            .product-card {
                background-color: #fff;
                border-radius: 8px;
                width: 250px;
                padding: 20px;
                text-align: center;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
                transition: transform 0.2s;
            }
            .product-card:hover {
                transform: translateY(-5px);
            }
            .product-card img {
                width: 100%;
                height: 150px;
                object-fit: cover;
                border-radius: 5px;
                background-color: #eee; /* Placeholder gambar */
                margin-bottom: 15px;
            }
            .price {
                color: #d87093;
                font-weight: bold;
                font-size: 18px;
                margin: 10px 0;
            }
            .btn-cart {
                background-color: #ffb6c1;
                color: white;
                border: none;
                padding: 10px 15px;
                border-radius: 5px;
                cursor: pointer;
                width: 100%;
                font-weight: bold;
            }
            .btn-cart:hover {
                background-color: #d87093;
            }
            /* Bagian Bawah */
            footer {
                background-color: #333;
                color: white;
                text-align: center;
                padding: 20px;
                margin-top: 20px;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Maison de Sucre</h1>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Produk</a></li>
                    <li><a href="#">Keranjang (0)</a></li>
                </ul>
            </nav>
        </header>
        <section class="hero">
            <h2>Sweetness in Every Bite</h2>
            <p>Temukan berbagai macam dessert premium untuk harimu.</p>
        </section>
        <section class="products">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1569864358642-9d1684040f43?auto=format&fit=crop&w=300&q=80" alt="Macaron Box" />
                <h3>Classic Macaron Box</h3>
                <p class="price">Rp 120.000</p>
                <button class="btn-cart">+ Tambah</button>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1602663491496-73f07481dbea?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGauto=format&fit=crop&w=300&q=80" alt="Strawberry Shortcake" />
                <h3>Strawberry Shortcake</h3>
                <p class="price">Rp 45.000</p>
                <button class="btn-cart">+ Tambah</button>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1548883354-7622d03aca27?auto=format&fit=crop&w=300&q=80" alt="Chocolate Truffle" />
                <h3>Chocolate Truffle</h3>
                <p class="price">Rp 65.000</p>
                <button class="btn-cart">+ Tambah</button>
            </div>
        </section>
        <footer>
            <p>&copy; 2026 Maison de Sucre. All rights reserved.</p>
        </footer>
    </body>
</html>
