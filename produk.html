<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Produk | E-Commerce</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            }
            body {
                background-color: #fcf9f5;
                color: #333;
            }
            header {
                background-color: #426a9f;
                padding: 20px 40px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            }
            header h1 {
                color: #320321;
                font-size: 24px;
                letter-spacing: 1px;
            }
            nav ul {
                list-style: none;
                display: flex;
                gap: 20px;
            }
            nav a {
                text-decoration: none;
                color: #1a6867;
                font-weight: bold;
            }
            .hero {
                text-align: center;
                padding: 60px 20px;
                background-color: #2ca99b;
                margin-bottom: 30px;
            }
            .hero h2 {
                font-size: 32px;
                color: #17888c;
                margin-bottom: 10px;
            }
            .products {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 25px;
                padding: 0 40px 50px 40px;
            }
            .product-card {
                background-color: #20aaa7;
                border-radius: 8px;
                width: 250px;
                padding: 20px;
                text-align: center;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
                transition: transform 0.2s;
            }
            .product-card:hover {
                transform: translateY(-5px);
            }
            .product-card img {
                width: 100%;
                height: 150px;
                object-fit: cover;
                border-radius: 5px;
                background-color: #15427d;
                margin-bottom: 15px;
            }
            .price {
                color: #18607e;
                font-weight: bold;
                font-size: 18px;
                margin: 10px 0;
            }
            .btn-cart {
                background-color: #1e849b;
                color: rgb(6, 36, 63);
                border: none;
                padding: 10px 15px;
                border-radius: 5px;
                cursor: pointer;
                width: 100%;
                font-weight: bold;
            }
            .btn-cart:hover {
                background-color: #08557f;
            }
            footer {
                background-color: #411865;
                color: rgb(21, 103, 128);
                text-align: center;
                padding: 20px;
                margin-top: 20px;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>singgah doeloe</h1>
            <nav>
                <ul>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="produk.html">Produk</a></li>
                    <li><a href="keranjang.html">Keranjang (0)</a></li>
                </ul>
            </nav>
        </header>
        <section class="hero">
            <h2>Katalog Produk</h2>
            <p>Jelajahi koleksi dessert kami dan pilih favoritmu.</p>
        </section>
        <section class="products">
            <div class="product-card">
                <img src="https://plus.unsplash.com/premium_photo-1726718559970-3f47f44d6540?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OXx8ZGVzc2VydCUyMG1ha2FuYW58ZW58MHx8MHx8fDA%3D" alt="cake coklat" />
                <h3>Cake Coklat</h3>
                <p class="price">Rp 400.000</p>
                <button class="btn-cart">+ Tambah</button>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1734056650036-7002ede7b8f8?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="crepes coklat stoberi" />
                <h3>Crepes Coklat Stoberi</h3>
                <p class="price">Rp 35.000</p>
                <button class="btn-cart">+ Tambah</button>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1580682196728-88aeee0a86bf?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8ZGVzc2VydCUyMG1ha2FuYW58ZW58MHx8MHx8fDA%3D" alt="pie buah" />
                <h3>Pie Buah</h3>
                <p class="price">Rp 25.000</p>
                <button class="btn-cart">+ Tambah</button>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1581978392717-c0f3b3b22cd1?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTV8fGRlc3NlcnQlMjBtYWthbmFufGVufDB8fDB8fHww" alt="muffin" />
                <h3>Muffin</h3>
                <p class="price">Rp 25.000</p>
                <button class="btn-cart">+ Tambah</button>
            </div>
        </section>
        <footer>
            <p>&copy; 2026 Maison de Sucre. All rights reserved.</p>
        </footer>
        <script src="script.js"></script>
    </body>
</html>
